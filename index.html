<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pomodoro Timer</title>
  <style>
    :root {
      --bg: #ffffff;
      --card: #f0f8ff;
      --text: #1e293b;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #4A9ECC;
      --accent-dark: #3786b0;
      --break: #52b788;
      --break-dark: #42946f;
      --shell-bg: #ffffff;
      --shell-tint: rgba(74, 158, 204, 0.08);
      --danger: #ef4444;
      --shadow: none;
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.4;
    }

    button,
    input {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    button:disabled,
    input:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    :focus-visible {
      outline: 3px solid var(--accent);
      outline-offset: 3px;
    }

    .app {
      width: calc(100% - 32px);
      max-width: 480px;
      margin: 0 auto;
      padding: 32px 0 40px;
    }

    .panel {
      border: 1px solid var(--border);
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: var(--shadow);
    }

    .header {
      margin-bottom: 20px;
    }

    .eyebrow {
      margin: 0 0 8px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.1;
    }

    .status-line {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 0.96rem;
    }

    .timer-shell {
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 2px);
      background: var(--shell-bg);
      padding: 24px 18px 20px;
      text-align: center;
      transition: border-color 0.18s ease, background-color 0.18s ease, transform 0.18s ease;
    }

    .phase-label {
      margin: 0 0 10px;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
    }

    .session-state {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      margin-bottom: 10px;
      padding: 0 12px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }

    .session-state.is-running {
      border-color: rgba(74, 158, 204, 0.35);
      color: var(--accent);
    }

    .session-state.is-paused {
      border-color: rgba(122, 138, 160, 0.45);
      color: #64748b;
    }

    .session-state.is-break {
      border-color: rgba(82, 183, 136, 0.35);
      color: var(--break);
    }

    .phase-label .paused-note {
      color: var(--muted);
      font-weight: 600;
    }

    .timer-display {
      margin: 0;
      font-size: 84px;
      line-height: 0.95;
      font-weight: 800;
      letter-spacing: -0.05em;
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    .timer-display.is-paused {
      color: #64748b;
    }

    .progress-track {
      width: min(100%, 280px);
      height: 10px;
      margin: 18px auto 0;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fff;
      overflow: hidden;
    }

    .progress-fill {
      width: 100%;
      height: 100%;
      transform-origin: left center;
      transform: scaleX(1);
      background: var(--accent);
      transition: transform 0.3s linear, background-color 0.18s ease;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin: 18px 0 0;
    }

    .button {
      border: 1px solid transparent;
      border-radius: 999px;
      min-height: 44px;
      padding: 0 18px;
      font-weight: 700;
      transition: background-color 0.15s ease, border-color 0.15s ease, color 0.15s ease, opacity 0.15s ease;
    }

    .button-primary {
      background: var(--accent);
      color: #fff;
    }

    .button-primary:hover:not(:disabled) {
      background: var(--accent-dark);
    }

    .button-secondary {
      border-color: var(--accent);
      background: #fff;
      color: var(--accent);
    }

    .button-secondary:hover:not(:disabled) {
      background: rgba(74, 158, 204, 0.08);
    }

    .button-link {
      border-color: transparent;
      background: transparent;
      color: var(--accent);
      padding-inline: 10px;
      text-decoration: underline;
      text-underline-offset: 0.18em;
    }

    .button-link:hover:not(:disabled) {
      color: var(--accent-dark);
    }

    .button-done {
      border-color: var(--border);
      background: #fff;
      color: var(--muted);
    }

    .settings,
    .history {
      margin-top: 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      padding: 18px;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
    }

    .settings-grid {
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 6px;
    }

    .field label {
      font-size: 0.94rem;
      font-weight: 600;
      color: var(--text);
    }

    .field input {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0 14px;
      color: var(--text);
      background: #fff;
    }

    .field input:focus-visible {
      border-color: var(--accent);
    }

    .field-help {
      margin: 0;
      font-size: 0.85rem;
      color: var(--muted);
    }

    .history-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .history-item {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      color: var(--text);
      background: #fff;
    }

    .history-empty {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .pulse {
      animation: pulseFlash 0.5s ease-out;
    }

    @keyframes pulseFlash {
      0% {
        background: rgba(74, 158, 204, 0.08);
      }
      50% {
        background: rgba(82, 183, 136, 0.11);
      }
      100% {
        background: transparent;
      }
    }

    .app[data-phase="focus"] {
      --accent: #4A9ECC;
      --accent-dark: #3786b0;
      --shell-bg: #ffffff;
      --shell-tint: rgba(74, 158, 204, 0.08);
    }

    .app[data-phase="break"] {
      --accent: #52b788;
      --accent-dark: #42946f;
      --shell-bg: #fbfffd;
      --shell-tint: rgba(82, 183, 136, 0.08);
    }

    .app[data-phase="paused"] {
      --accent: #7a8aa0;
      --accent-dark: #64748b;
      --shell-bg: #f8fafc;
      --shell-tint: rgba(122, 138, 160, 0.08);
    }

    .app[data-phase="focus"] .progress-fill {
      background: #4A9ECC;
    }

    .app[data-phase="break"] .progress-fill {
      background: #52b788;
    }

    .app[data-phase="paused"] .progress-fill {
      background: #7a8aa0;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 400px) {
      .app {
        width: calc(100% - 20px);
        padding: 16px 0 24px;
      }

      .panel,
      .settings,
      .history,
      .timer-shell {
        padding: 16px;
      }

      .timer-display {
        font-size: 60px;
      }

      .session-state {
        margin-bottom: 8px;
      }

      .controls {
        gap: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="app" id="app" data-phase="focus">
    <section class="panel" aria-labelledby="app-title">
      <div class="header">
        <p class="eyebrow">Pomodoro Timer</p>
        <h1 id="app-title">Work in focused intervals.</h1>
        <p class="status-line" id="statusLine">Idle and ready.</p>
      </div>

      <div class="timer-shell" id="timerShell">
        <div class="session-state" id="sessionState">Ready</div>
        <p class="phase-label" id="phaseLabel">Focus 🎯</p>
        <div class="timer-display" id="timerDisplay" role="timer" aria-live="polite" aria-atomic="true">25:00</div>
        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="controls" aria-label="Timer controls">
          <button class="button button-primary" id="startButton" type="button" aria-label="Start the timer">Start</button>
          <button class="button button-secondary" id="pauseButton" type="button" aria-label="Pause or resume the timer" disabled>Pause</button>
          <button class="button button-link" id="resetButton" type="button" aria-label="Reset the timer and apply settings">Reset</button>
        </div>
      </div>

      <section class="settings" aria-labelledby="settings-title">
        <h2 class="section-title" id="settings-title">Settings</h2>
        <div class="settings-grid">
          <div class="field">
            <label for="focusMinutes">Focus duration (minutes)</label>
            <input id="focusMinutes" type="number" inputmode="numeric" min="1" step="1" value="25" aria-describedby="focusHelp">
            <p class="field-help" id="focusHelp">Used for the next focus cycle or after reset.</p>
          </div>
          <div class="field">
            <label for="breakMinutes">Break duration (minutes)</label>
            <input id="breakMinutes" type="number" inputmode="numeric" min="1" step="1" value="5" aria-describedby="breakHelp">
            <p class="field-help" id="breakHelp">Used for the next break cycle or after reset.</p>
          </div>
        </div>
      </section>

      <section class="history" aria-labelledby="history-title">
        <h2 class="section-title" id="history-title">Today’s history</h2>
        <ul class="history-list" id="historyList"></ul>
        <p class="history-empty" id="historyEmpty">No focus sessions completed yet today.</p>
      </section>
    </section>
  </main>

  <script>
    const app = document.getElementById('app');
    const timerShell = document.getElementById('timerShell');
    const timerDisplay = document.getElementById('timerDisplay');
    const progressFill = document.getElementById('progressFill');
    const sessionState = document.getElementById('sessionState');
    const phaseLabel = document.getElementById('phaseLabel');
    const statusLine = document.getElementById('statusLine');
    const startButton = document.getElementById('startButton');
    const pauseButton = document.getElementById('pauseButton');
    const resetButton = document.getElementById('resetButton');
    const focusInput = document.getElementById('focusMinutes');
    const breakInput = document.getElementById('breakMinutes');
    const historyList = document.getElementById('historyList');
    const historyEmpty = document.getElementById('historyEmpty');

    const STORAGE_PREFIX = 'pomodoro-history:';
    const DEFAULT_SETTINGS = {
      focusMinutes: 25,
      breakMinutes: 5,
    };

    let timerId = null;
    let flashTimeoutId = null;
    let transitionTimeoutId = null;
    let audioContext = null;
    let status = 'idle';
    let phase = 'focus';
    let pendingSettings = { ...DEFAULT_SETTINGS };
    let activeSettings = { ...DEFAULT_SETTINGS };
    let remainingSeconds = DEFAULT_SETTINGS.focusMinutes * 60;
    let cycleStartDurationSeconds = DEFAULT_SETTINGS.focusMinutes * 60;

    function todayKey() {
      const now = new Date();
      const year = now.getFullYear();
      const month = String(now.getMonth() + 1).padStart(2, '0');
      const day = String(now.getDate()).padStart(2, '0');
      return `${year}-${month}-${day}`;
    }

    function historyStorageKey() {
      return `${STORAGE_PREFIX}${todayKey()}`;
    }

    function loadTodayHistory() {
      try {
        const raw = localStorage.getItem(historyStorageKey());
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveTodayHistory(entries) {
      localStorage.setItem(historyStorageKey(), JSON.stringify(entries));
    }

    function renderHistory() {
      const entries = loadTodayHistory();
      historyList.innerHTML = '';

      if (entries.length === 0) {
        historyEmpty.hidden = false;
        return;
      }

      historyEmpty.hidden = true;
      for (const entry of entries) {
        const item = document.createElement('li');
        item.className = 'history-item';
        item.textContent = entry;
        historyList.appendChild(item);
      }
    }

    function addHistoryEntry(text) {
      const entries = loadTodayHistory();
      entries.unshift(text);
      saveTodayHistory(entries);
      renderHistory();
    }

    function formatTime(seconds) {
      const safeSeconds = Math.max(0, Math.round(seconds));
      const minutes = String(Math.floor(safeSeconds / 60)).padStart(2, '0');
      const remaining = String(safeSeconds % 60).padStart(2, '0');
      return `${minutes}:${remaining}`;
    }

    function formatClockTime(date) {
      const hours = date.getHours();
      const minutes = String(date.getMinutes()).padStart(2, '0');
      const hour12 = hours % 12 || 12;
      const suffix = hours < 12 ? 'am' : 'pm';
      return `${hour12}:${minutes}${suffix}`;
    }

    function clampPositiveMinutes(value, fallback) {
      const parsed = Number.parseInt(value, 10);
      if (!Number.isFinite(parsed) || parsed < 1) {
        return fallback;
      }
      return parsed;
    }

    function readSettingsFromInputs() {
      return {
        focusMinutes: clampPositiveMinutes(focusInput.value, DEFAULT_SETTINGS.focusMinutes),
        breakMinutes: clampPositiveMinutes(breakInput.value, DEFAULT_SETTINGS.breakMinutes),
      };
    }

    function syncPendingSettings() {
      pendingSettings = readSettingsFromInputs();
    }

    function syncInputsFromActiveSettings() {
      focusInput.value = String(activeSettings.focusMinutes);
      breakInput.value = String(activeSettings.breakMinutes);
    }

    function setStatus(nextStatus) {
      status = nextStatus;
      app.dataset.phase = nextStatus === 'paused' ? 'paused' : phase;
      updateUI();
    }

    function getPhaseLabelText() {
      const base = phase === 'focus' ? 'Focus 🎯' : 'Break ☕';
      return status === 'paused' ? `${base} <span class="paused-note">(paused)</span>` : base;
    }

    function getSessionStateText() {
      if (status === 'paused') {
        return 'Paused';
      }

      if (status === 'running') {
        return phase === 'focus' ? 'Focusing now' : 'On break';
      }

      if (status === 'done') {
        return 'Session done';
      }

      return 'Ready';
    }

    function updateUI() {
      app.dataset.phase = status === 'paused' ? 'paused' : phase;
      timerDisplay.textContent = formatTime(remainingSeconds);
      timerDisplay.classList.toggle('is-paused', status === 'paused');
      phaseLabel.innerHTML = getPhaseLabelText();
      sessionState.textContent = getSessionStateText();
      const sessionStateClasses = ['session-state'];
      if (status === 'paused') {
        sessionStateClasses.push('is-paused');
      } else if (status === 'running') {
        sessionStateClasses.push('is-running');
        if (phase === 'break') {
          sessionStateClasses.push('is-break');
        }
      } else if (phase === 'break') {
        sessionStateClasses.push('is-break');
      }
      sessionState.className = sessionStateClasses.join(' ');

      const totalSeconds = Math.max(1, cycleStartDurationSeconds || remainingSeconds);
      const progress = Math.max(0, Math.min(1, 1 - remainingSeconds / totalSeconds));
      progressFill.style.transform = `scaleX(${progress})`;

      if (status === 'idle') {
        startButton.disabled = false;
        startButton.textContent = 'Start';
        pauseButton.disabled = true;
        pauseButton.textContent = 'Pause';
        resetButton.disabled = false;
        statusLine.textContent = 'Idle and ready.';
      } else if (status === 'running') {
        startButton.disabled = true;
        startButton.textContent = 'Start';
        pauseButton.disabled = false;
        pauseButton.textContent = 'Pause';
        resetButton.disabled = false;
        statusLine.textContent = `${phase === 'focus' ? 'Focus' : 'Break'} session in progress.`;
      } else if (status === 'paused') {
        startButton.disabled = true;
        startButton.textContent = 'Start';
        pauseButton.disabled = false;
        pauseButton.textContent = 'Resume';
        resetButton.disabled = false;
        statusLine.textContent = 'Timer paused.';
      } else if (status === 'done') {
        startButton.disabled = true;
        pauseButton.disabled = true;
        resetButton.disabled = true;
        startButton.textContent = 'Start';
        pauseButton.textContent = 'Pause';
        statusLine.textContent = 'Session complete. Switching now.';
      }
    }

    function stopTimer() {
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
    }

    function ensureAudioContext() {
      if (!audioContext) {
        const AudioCtor = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtor) {
          return null;
        }
        audioContext = new AudioCtor();
      }
      return audioContext;
    }

    async function unlockAudio() {
      const context = ensureAudioContext();
      if (!context) {
        return null;
      }

      if (context.state === 'suspended') {
        try {
          await context.resume();
        } catch {
          return null;
        }
      }

      return context;
    }

    function playTone(context, frequency, durationSeconds, peakGain, options = {}) {
      const { type = 'sine', startOffset = 0 } = options;
      const oscillator = context.createOscillator();
      const gainNode = context.createGain();
      const startTime = context.currentTime + startOffset;
      const endTime = startTime + durationSeconds;

      oscillator.type = type;
      oscillator.frequency.setValueAtTime(frequency, startTime);
      gainNode.gain.setValueAtTime(0.0001, startTime);
      gainNode.gain.exponentialRampToValueAtTime(peakGain, startTime + 0.01);
      gainNode.gain.exponentialRampToValueAtTime(0.0001, endTime);

      oscillator.connect(gainNode);
      gainNode.connect(context.destination);
      oscillator.start(startTime);
      oscillator.stop(endTime + 0.02);

      oscillator.onended = () => {
        oscillator.disconnect();
        gainNode.disconnect();
      };
    }

    async function playTickSound() {
      const context = await unlockAudio();
      if (!context) {
        return;
      }

      playTone(context, 1200, 0.05, 0.02, { type: 'square' });
    }

    async function playTransitionSound(completedPhase) {
      const context = await unlockAudio();
      if (!context) {
        return;
      }

      // Use different short patterns so focus->break and break->focus are easy to distinguish.
      if (completedPhase === 'focus') {
        playTone(context, 523.25, 0.18, 0.1, { type: 'sine', startOffset: 0 });
        playTone(context, 659.25, 0.22, 0.1, { type: 'sine', startOffset: 0.12 });
      } else {
        playTone(context, 392, 0.18, 0.09, { type: 'triangle', startOffset: 0 });
        playTone(context, 329.63, 0.2, 0.09, { type: 'triangle', startOffset: 0.11 });
      }
    }

    function startTicking() {
      stopTimer();
      timerId = setInterval(() => {
        remainingSeconds -= 1;
        if (remainingSeconds <= 0) {
          remainingSeconds = 0;
          updateUI();
          handleCycleEnd();
          return;
        }
        void playTickSound();
        updateUI();
      }, 1000);
    }

    function handleCycleEnd() {
      const completedPhase = phase;
      stopTimer();
      setStatus('done');

      if (phase === 'focus') {
        const completedLabel = `${formatTime(cycleStartDurationSeconds)} focus — ${formatClockTime(new Date())}`;
        addHistoryEntry(`✓ ${completedLabel}`);
      }

      timerShell.classList.add('pulse');
      timerShell.style.borderColor = phase === 'focus' ? 'rgba(74, 158, 204, 0.55)' : 'rgba(82, 183, 136, 0.55)';
      clearTimeout(flashTimeoutId);
      clearTimeout(transitionTimeoutId);

      void playTransitionSound(completedPhase);

      flashTimeoutId = setTimeout(() => {
        timerShell.classList.remove('pulse');
        timerShell.style.borderColor = '';
      }, 500);

      transitionTimeoutId = setTimeout(() => {
        phase = phase === 'focus' ? 'break' : 'focus';
        activeSettings = { ...pendingSettings };
        if (phase === 'focus') {
          remainingSeconds = activeSettings.focusMinutes * 60;
        } else {
          remainingSeconds = activeSettings.breakMinutes * 60;
        }
        cycleStartDurationSeconds = remainingSeconds;
        setStatus('running');
        startTicking();
        updateUI();
      }, 500);
    }

    function handleStart() {
      if (status === 'idle') {
        void unlockAudio();
        syncPendingSettings();
        if (phase === 'focus') {
          activeSettings = { ...pendingSettings };
          remainingSeconds = activeSettings.focusMinutes * 60;
          cycleStartDurationSeconds = remainingSeconds;
        } else {
          remainingSeconds = activeSettings.breakMinutes * 60;
          cycleStartDurationSeconds = remainingSeconds;
        }
        setStatus('running');
        startTicking();
        updateUI();
      }
    }

    function handlePauseResume() {
      if (status === 'running') {
        stopTimer();
        setStatus('paused');
        return;
      }

      if (status === 'paused') {
        void unlockAudio();
        setStatus('running');
        startTicking();
      }
    }

    function handleReset() {
      clearTimeout(flashTimeoutId);
      clearTimeout(transitionTimeoutId);
      timerShell.classList.remove('pulse');
      timerShell.style.borderColor = '';
      stopTimer();
      syncPendingSettings();
      activeSettings = { ...pendingSettings };
      phase = 'focus';
      remainingSeconds = activeSettings.focusMinutes * 60;
      cycleStartDurationSeconds = remainingSeconds;
      setStatus('idle');
      updateUI();
    }

    startButton.addEventListener('click', handleStart);
    pauseButton.addEventListener('click', handlePauseResume);
    resetButton.addEventListener('click', handleReset);
    focusInput.addEventListener('change', syncPendingSettings);
    breakInput.addEventListener('change', syncPendingSettings);
    focusInput.addEventListener('input', syncPendingSettings);
    breakInput.addEventListener('input', syncPendingSettings);

    window.addEventListener('beforeunload', () => {
      stopTimer();
      clearTimeout(flashTimeoutId);
      clearTimeout(transitionTimeoutId);
    });

    syncInputsFromActiveSettings();
    renderHistory();
    updateUI();
  </script>
</body>
</html>
